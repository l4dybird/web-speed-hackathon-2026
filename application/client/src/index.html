<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CaX</title>
    <% for (const cssFile of htmlWebpackPlugin.files.css) { %>
    <link rel="stylesheet" href="<%= cssFile.startsWith('/') ? cssFile : `/${cssFile}` %>" />
    <% } %>
  </head>
  <body class="bg-cax-canvas text-cax-text">
    <div id="app"><!--app-boot-preview--></div>
    <script id="initial-data-script">window.__INITIAL_DATA__ = {};</script>
    <% for (const jsFile of htmlWebpackPlugin.files.js) { %>
    <script src="<%= jsFile.startsWith('/') ? jsFile : `/${jsFile}` %>"></script>
    <% } %>
  </body>
</html>
